<!DOCTYPE html>
<html lang=en>
  <meta charset=utf-8>
  <meta name=viewport content=width=device-width>
  <meta name=viewport content=initial-scale=1>
  <meta name=robots content=noindex>
  <meta name=robots content=noarchive>
  <title>rilkean.com</title>
  <style>
    @font-face {
      font-family: tributeot;
      src: url(./assets/font/tributeot-roman-webfont.woff2) format(woff2),
           url(./assets/font/tributeot-roman-webfont.woff) format(woff);
      font-weight: normal;
      font-style: normal;
    }
    ::selection {
      background: #fffdd0;
      color: #ba55d3;
    }
    * {
      background: #fff;
      color: #ba55d3;
      font-family: tributeot, serif;

      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 92px;
      font-weight: normal;
    }
    header, main, img {
      display: block;
    }
    header {
      display: flex;
      text-align: center;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
    }
    main {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      flex-wrap: wrap;
      align-content: flex-start;
      text-align: center;
      padding: 0 20px 30px;
      margin-top: -15vh;
    }
    .exploration {
      padding: 30px;
      margin: auto;
      max-width: 100%;
    }
    .exploration a img {
      margin-bottom: 16px;
      border: 2px solid #d3d3d3;
      max-width: 100%;
    }
    .exploration a img:hover {
      border: 2px solid #ba55d3;
    }
    @media only screen and (max-width: 414px) {
      h1 {
        font-size: 62px;
      }
      main {
        margin-top: -140px;
        padding-left: 0;
        padding-right: 0;
      }
      .exploration {
        padding: 20px;
      }
    }
    @media only screen and (max-width: 1024px) {
      main {
        margin-top: -190px;
      }
    }
  </style>
  <header>
    <h1>rilkean.com</h1>
  </header>
  <main>
    <div class=exploration>
      <a href=https://rilkean.com/art>
        <img src=./assets/explorations/art-exploration.png alt=art-exploration title=art-exploration width=400>
      </a>
    </div>
    <div class=exploration>
      <a href=https://rilkean.com/jot>
        <img src=./assets/explorations/jot-exploration.png alt=jot-exploration title=jot-exploration width=500>
      </a>
    </div>
    <div class=exploration>
      <a href=https://rilkean.com/log>
        <img src=./assets/explorations/log-exploration.png alt=resume-exploration title=log-exploration width=525>
      </a>
    </div>
    <div class=exploration>
      <a href=https://github.com/apophatic/resume>
        <img src=./assets/explorations/resume-exploration.jpeg alt=log-exploration title=log-exploration width=375>
      </a>
    </div>
  </main>
</html>
