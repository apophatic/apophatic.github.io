  <style>

      font-family: Barriecito;
      src: url(./assets/font/Barriecito-Regular.ttf) format(truetype);
      font-weight: normal;
      font-style: normal;
    }
    ::selection {
      background: #fffdd0;
      color: mediumorchid;
    }
    * {
      background: mediumorchid;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Barriecito, system-ui; 
    }

    h1, footer {
      color: #fffdd0;
      font-size: 92px;
      font-weight: normal;
    }
    header, main, img, footer {
      display: block;
    }
    header, footer {
      display: flex;
      text-align: center;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
    }
    main {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      flex-wrap: wrap;
      align-content: flex-start;
      text-align: center;
      padding: 0 20px 30px;
      margin-top: -15vh;
    }
    .project {
      padding: 30px;
      margin: auto;
      max-width: 100%;
    }
    .project a img {
      margin-bottom: 16px;
      border: 8px solid rgb(139, 64, 158);
      max-width: 100%;
    }
    .project a img:hover {
      border: 4px solid rgb(139, 64, 158);
    }
    @media only screen and (max-width: 414px) {
      h1 {
        font-size: 62px;
      }
      main {
        margin-top: -140px;
        padding-left: 0;
        padding-right: 0;
      }
      .project {
        padding: 20px;
      }
    }
    @media only screen and (max-width: 1024px) {
      main {
        margin-top: -190px;
      }
    }
